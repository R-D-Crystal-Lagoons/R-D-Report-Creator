<style>
:root {
  --turquoise: #00A0B0;
  --turquoise-dark: #008090;
  --turquoise-light: #E0F7FA;
  --turquoise-glow: rgba(0,160,176,0.15);
  --bg: #F3F5F8;
  --card: #FFFFFF;
  --text: #1A2B3C;
  --text2: #6B7B8D;
  --danger: #E74C3C;
  --danger-light: rgba(231,76,60,0.1);
  --radius: 14px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
button { font-family: inherit; cursor: pointer; border: none; outline: none; }
input, textarea { font-family: inherit; outline: none; }

/* Header */
.header {
  background: linear-gradient(135deg, var(--turquoise) 0%, var(--turquoise-dark) 100%);
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,160,176,0.3);
}
.header-back {
  background: rgba(255,255,255,0.2); border-radius: 8px;
  color: #fff; font-size: 18px; padding: 5px 10px;
  margin-right: 10px; display: none;
}
.header-back.visible { display: inline-block; }
.header-logo { height: 24px; }
.header-title { color: #fff; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }

/* Content */
.content { padding: 16px; max-width: 500px; margin: 0 auto; }
.section-title { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
.section-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; }

/* Cards / Folders */
.folder-card {
  background: var(--card); border: 1px solid #E8ECF0; border-radius: var(--radius);
  padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; box-shadow: var(--shadow); transition: border-color 0.2s;
}
.folder-card:active { border-color: var(--turquoise); }
.folder-icon {
  width: 40px; height: 40px; border-radius: 10px; background: var(--turquoise-light);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  flex-shrink: 0; margin-right: 12px;
}
.folder-info { flex: 1; }
.folder-name { font-weight: 600; font-size: 14px; }
.folder-count { font-size: 11px; color: var(--text2); margin-top: 1px; }
.folder-arrow { color: var(--text2); font-size: 16px; }

/* New folder */
.new-folder-box {
  background: var(--card); border-radius: var(--radius); padding: 14px;
  border: 2px solid var(--turquoise); box-shadow: 0 2px 12px var(--turquoise-glow);
  margin-bottom: 10px;
}
.new-folder-box input {
  width: 100%; border: 1px solid #E0E4E8; border-radius: 10px; padding: 9px 12px;
  font-size: 13px; margin-bottom: 8px;
}
.new-folder-box input:focus { border-color: var(--turquoise); }
.btn-row { display: flex; gap: 8px; }

/* Buttons */
.btn-primary {
  background: linear-gradient(135deg, var(--turquoise), var(--turquoise-dark));
  color: #fff; border-radius: 12px; padding: 12px 0; font-weight: 700; font-size: 14px;
  width: 100%; box-shadow: 0 3px 14px rgba(0,160,176,0.3); transition: opacity 0.2s;
}
.btn-primary:active { opacity: 0.85; }
.btn-primary:disabled { background: #C0C8D0; box-shadow: none; }
.btn-secondary {
  background: var(--card); border: 1px solid var(--turquoise); color: var(--turquoise);
  border-radius: 12px; padding: 12px 0; font-weight: 600; font-size: 13px;
  width: 100%; transition: background 0.2s;
}
.btn-secondary:active { background: var(--turquoise-light); }
.btn-ghost {
  background: transparent; border: 2px dashed var(--turquoise); border-radius: var(--radius);
  padding: 12px 0; color: var(--turquoise); font-weight: 600; font-size: 13px;
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-sm {
  padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 600;
}
.btn-cancel { background: #F0F2F5; color: var(--text2); border-radius: 12px; padding: 12px 0; font-weight: 600; font-size: 14px; width: 100%; }

/* Photo card */
.photo-card {
  background: var(--card); border-radius: var(--radius); overflow: hidden;
  border: 1px solid #E8ECF0; box-shadow: var(--shadow); margin-bottom: 12px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.photo-card.selected {
  border: 2px solid var(--turquoise);
  box-shadow: 0 2px 12px var(--turquoise-glow);
}
.photo-card img { width: 100%; height: 180px; object-fit: cover; display: block; }
.photo-img-wrap { position: relative; }
.photo-select {
  position: absolute; top: 8px; right: 8px;
  width: 26px; height: 26px; border-radius: 8px;
  background: rgba(255,255,255,0.9); border: 2px solid #CCC;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: 700;
}
.photo-card.selected .photo-select {
  background: var(--turquoise); border-color: var(--turquoise);
}
.photo-badges {
  position: absolute; bottom: 6px; left: 6px; display: flex; gap: 4px;
}
.badge {
  font-size: 9px; padding: 2px 7px; border-radius: 5px; font-weight: 600; color: #fff;
}
.badge-text { background: rgba(0,0,0,0.6); }
.badge-audio { background: rgba(0,160,176,0.85); }
.photo-meta { padding: 8px 12px; }
.photo-date { font-size: 10px; color: var(--text2); margin-bottom: 3px; }
.photo-text { font-size: 12px; line-height: 1.4; }
.photo-transcript {
  margin-top: 5px; padding: 5px 8px; background: var(--turquoise-light);
  border-radius: 6px; font-size: 11px; color: var(--turquoise-dark); font-style: italic;
}

/* Camera */
.camera-wrap {
  background: #0a0a1a; border-radius: 14px; height: 260px;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; margin-bottom: 12px; border: 2px solid #222;
}
.camera-wrap video { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
.camera-crosshair {
  position: absolute; width: 50px; height: 50px;
  border: 2px solid rgba(0,160,176,0.5); border-radius: 3px;
  top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none;
}
.rec-indicator {
  position: absolute; top: 10px; right: 10px;
  display: flex; align-items: center; gap: 5px;
  background: rgba(231,76,60,0.9); border-radius: 16px; padding: 3px 10px;
  color: #fff; font-size: 11px; font-weight: 700;
}
.rec-dot { width: 7px; height: 7px; border-radius: 50%; background: #fff; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Audio btn */
.btn-audio {
  border-radius: 10px; padding: 10px 0; font-weight: 600; font-size: 13px;
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
  margin-bottom: 10px;
}
.btn-audio.idle { background: var(--turquoise-glow); border: 1px solid var(--turquoise); color: var(--turquoise); }
.btn-audio.recording { background: var(--danger-light); border: 1px solid var(--danger); color: var(--danger); }

/* Audio result */
.audio-result {
  padding: 7px 10px; background: var(--turquoise-light); border-radius: 8px;
  font-size: 11px; color: var(--turquoise-dark); display: flex; align-items: center; gap: 7px;
  margin-bottom: 10px;
}
.audio-result-title { font-weight: 600; }
.audio-result-text { font-style: italic; margin-top: 1px; }
.btn-delete-audio {
  background: var(--danger-light); border: 1px solid var(--danger); border-radius: 8px;
  padding: 8px 12px; color: var(--danger); font-weight: 600; font-size: 13px;
  flex-shrink: 0;
}

/* Report */
.form-label { font-size: 12px; font-weight: 600; color: var(--text); display: block; margin-bottom: 5px; }
.form-input {
  width: 100%; border: 1px solid #E0E4E8; border-radius: 10px; padding: 9px 12px;
  font-size: 13px; margin-bottom: 14px;
}
.form-input:focus { border-color: var(--turquoise); }
.form-textarea {
  width: 100%; border: 1px solid #E0E4E8; border-radius: 10px; padding: 9px 12px;
  font-size: 13px; resize: vertical; font-family: inherit; margin-bottom: 6px;
}
.form-textarea:focus { border-color: var(--turquoise); }
.toggle-row { display: flex; gap: 6px; margin-bottom: 8px; }
.toggle-btn {
  padding: 5px 12px; border-radius: 7px; font-size: 11px; font-weight: 600;
}
.toggle-btn.active { background: var(--turquoise); color: #fff; }
.toggle-btn.inactive { background: #E8ECF0; color: var(--text2); }

/* Dropdown */
.dropdown { position: relative; margin-bottom: 14px; }
.dropdown-list {
  position: absolute; top: 42px; left: 0; right: 0; background: var(--card);
  border-radius: 10px; border: 1px solid #E0E4E8; max-height: 180px; overflow-y: auto;
  z-index: 50; box-shadow: var(--shadow-lg);
}
.dropdown-item {
  width: 100%; text-align: left; padding: 9px 12px; background: transparent;
  border-bottom: 1px solid #F0F2F5; font-size: 12px;
}
.dropdown-item:active { background: var(--turquoise-light); }
.dropdown-item-name { font-weight: 600; color: var(--text); }
.dropdown-item-code { color: var(--text2); font-size: 10px; }
.selected-project {
  margin-top: 5px; padding: 6px 10px; background: var(--turquoise-light);
  border-radius: 7px; font-size: 12px; color: var(--turquoise-dark); font-weight: 600;
}

/* Selected photos row */
.selected-photos { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.mini-photo {
  width: 54px; height: 54px; border-radius: 8px; overflow: hidden;
  border: 2px solid var(--turquoise); position: relative;
}
.mini-photo img { width: 100%; height: 100%; object-fit: cover; }
.mini-remove {
  position: absolute; top: 1px; right: 1px; background: var(--danger); border-radius: 50%;
  width: 16px; height: 16px; color: #fff; font-size: 9px;
  display: flex; align-items: center; justify-content: center;
}

/* Report success */
.success-icon {
  width: 70px; height: 70px; border-radius: 50%; background: var(--turquoise-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; margin: 0 auto 16px;
}
.report-content-box {
  background: var(--card); border-radius: var(--radius); padding: 16px; border: 1px solid #E8ECF0;
  text-align: left; margin-bottom: 16px; font-size: 13px;
}
.report-content-box div { padding: 3px 0; }

/* Empty state */
.empty { text-align: center; padding: 50px 20px; color: var(--text2); }
.empty-icon { font-size: 42px; margin-bottom: 10px; }

/* Action row */
.action-row { display: flex; gap: 8px; margin-bottom: 14px; }
.action-row button { flex: 1; }

/* Hidden file input */
.hidden { display: none; }

/* Animations */
.fade-in { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* Progress */
.progress-wrap { margin: 16px 0; }
.progress-bar { height: 6px; background: #E8ECF0; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--turquoise), var(--turquoise-dark)); border-radius: 3px; transition: width 0.3s; }
.progress-label { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* Settings */
.settings-btn { background:rgba(255,255,255,0.2); border-radius:8px; color:#fff; font-size:16px; padding:5px 8px; }
.api-key-input { width:100%; border:1px solid #E0E4E8; border-radius:10px; padding:9px 12px; font-size:12px; font-family:monospace; }
.api-key-input:focus { border-color:var(--turquoise); }
.api-saved { color:var(--turquoise); font-size:12px; font-weight:600; margin-top:4px; }
</style>
</head>

// ═══════ IndexedDB ═══════
const DB_NAME = "RDReportsDB";
const DB_VER = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains("folders")) d.createObjectStore("folders", {keyPath:"name"});
      if (!d.objectStoreNames.contains("photos")) {
        const s = d.createObjectStore("photos", {keyPath:"id", autoIncrement:true});
        s.createIndex("folder","folder",{unique:false});
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e);
  });
}

function dbGetAll(store) {
  return new Promise((resolve,reject) => {
    const tx = db.transaction(store,"readonly");
    tx.objectStore(store).getAll().onsuccess = (e) => resolve(e.target.result);
    tx.onerror = reject;
  });
}

function dbAdd(store, data) {
  return new Promise((resolve,reject) => {
    const tx = db.transaction(store,"readwrite");
    const req = tx.objectStore(store).add(data);
    req.onsuccess = (e) => resolve(e.target.result);
    tx.onerror = reject;
  });
}

function dbPut(store, data) {
  return new Promise((resolve,reject) => {
    const tx = db.transaction(store,"readwrite");
    tx.objectStore(store).put(data).onsuccess = (e) => resolve(e.target.result);
    tx.onerror = reject;
  });
}

function dbDelete(store, key) {
  return new Promise((resolve,reject) => {
    const tx = db.transaction(store,"readwrite");
    tx.objectStore(store).delete(key).onsuccess = () => resolve();
    tx.onerror = reject;
  });
}

function dbGetByIndex(store, idx, val) {
  return new Promise((resolve,reject) => {
    const tx = db.transaction(store,"readonly");
    tx.objectStore(store).index(idx).getAll(val).onsuccess = (e) => resolve(e.target.result);
    tx.onerror = reject;
  });
}

  });
}

async function startAudioRec() {
  try {
    const audioStream = await navigator.mediaDevices.getUserMedia({audio:true});
    const mr = new MediaRecorder(audioStream);
    state.audioChunks = [];
    mr.ondataavailable = (e) => state.audioChunks.push(e.data);

      audioStream.getTracks().forEach(t=>t.stop());

      state.isRecording = false;

      if (state.speechRec) { try { state.speechRec.stop(); } catch(e){} state.speechRec = null; }
      render();
    };
    mr.start();
    state.mediaRecorder = mr;
    state.isRecording = true;
    state.recordingTime = 0;
    state.audioTranscript = "";
    // Start live transcription
    startSpeechRecognition("capture");
    // Update only the timer elements, NOT full render
    recInterval = setInterval(()=>{
      state.recordingTime++;

// ═══════ Web Speech API — Live Transcription ═══════
function startSpeechRecognition(target) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return; // Not available
  const recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = "es-CL";
  let finalTranscript = "";
  recognition.onresult = (event) => {
    let interim = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalTranscript += event.results[i][0].transcript + " ";
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    if (target === "capture") {
      state.audioTranscript = finalTranscript + interim;
      const el = document.getElementById("live-transcript");
      if (el) el.textContent = state.audioTranscript || "Escuchando...";
    } else if (target === "conclusions") {
      state.conclusionsTranscript = finalTranscript + interim;
      const el = document.getElementById("conc-live-transcript");
      if (el) el.textContent = state.conclusionsTranscript || "Escuchando...";
    } else if (target === "intro") {
      state.introTranscript = finalTranscript + interim;
      const el = document.getElementById("intro-live-transcript");
      if (el) el.textContent = state.introTranscript || "Escuchando...";
    } else if (target === "edit") {
      state.editAudioTranscript = finalTranscript + interim;
      const el = document.getElementById("edit-live-transcript");
      if (el) el.textContent = state.editAudioTranscript || "Escuchando...";
    }
  };
  recognition.onerror = (e) => { console.log("Speech error", e.error); };
  recognition.onend = () => {
    // Save final transcript
    if (target === "capture") state.audioTranscript = finalTranscript;
    else if (target === "conclusions") state.conclusionsTranscript = finalTranscript;
    else if (target === "intro") state.introTranscript = finalTranscript;
    else if (target === "edit") state.editAudioTranscript = finalTranscript;
  };
  recognition.start();
  if (target === "capture") state.speechRec = recognition;
  else if (target === "conclusions") state.concSpeechRec = recognition;
  else if (target === "intro") state.introSpeechRec = recognition;
  else if (target === "edit") state.editSpeechRec = recognition;
}

// ═══════ Parse Claude Response ═══════
function parseClaudeResponse(text) {
  try {
    // Clean up Claude's response
    let clean = text.trim();
    // Remove markdown code fences
    clean = clean.replace(/```json\s*/gi, "").replace(/```\s*/g, "");
    // Remove any text before the first { and after the last }
    const firstBrace = clean.indexOf("{");
    const lastBrace = clean.lastIndexOf("}");
    if (firstBrace === -1 || lastBrace === -1) {
      throw new Error("No se encontró un JSON válido en la respuesta");
    }
    clean = clean.substring(firstBrace, lastBrace + 1);
    // Replace curly/smart quotes with straight quotes
    clean = clean.replace(/[\u201C\u201D\u201E\u201F\u2033\u2036]/g, '"');
    clean = clean.replace(/[\u2018\u2019\u201A\u201B\u2032\u2035]/g, "'");
    // Replace en-dash and em-dash
    clean = clean.replace(/[\u2013\u2014]/g, "-");
    // Fix escaped newlines in values
    clean = clean.replace(/\n/g, "\\n");
    // Try to parse
    const parsed = JSON.parse(clean);
    if (!parsed.introduccion || !parsed.pruebas || !parsed.conclusiones) {
      throw new Error("Faltan campos requeridos (introduccion, pruebas, conclusiones)");
    }
    return parsed;
  } catch (e) {
    alert("Error al interpretar la respuesta: " + e.message + "\n\nAsegúrate de copiar toda la respuesta de Claude (el JSON completo desde { hasta }).");
    return null;
  }
}

            children: [new TextRun({ text: "ÍNDICE", color: TURQ, bold: true })]
          }),
          new TableOfContents("Índice", { hyperlink: true, headingStyleRange: "1-2" }),
          new Paragraph({ children: [new PageBreak()] }),

          // 1. INTRODUCCIÓN
          new Paragraph({
            heading: HeadingLevel.HEADING_1,
            children: [new TextRun({ text: "1. Introducción", color: TURQ, bold: true })]
          }),
          ...content.introduccion.split("\n").filter(p=>p.trim()).map(para =>
            new Paragraph({
              spacing: { after: 160 },
              children: [new TextRun({ text: para.trim(), size: 22, font: "Calibri" })]
            })
          ),

          // 2. PRUEBAS REALIZADAS
          new Paragraph({
            heading: HeadingLevel.HEADING_1,
            children: [new TextRun({ text: "2. Pruebas Realizadas", color: TURQ, bold: true })]
          }),
          ...testChildren,

          // 3. CONCLUSIONES
          new Paragraph({
            heading: HeadingLevel.HEADING_1,
            children: [new TextRun({ text: "3. Conclusiones", color: TURQ, bold: true })]
          }),
          ...content.conclusiones.split("\n").filter(p=>p.trim()).map(para =>
            new Paragraph({
              spacing: { after: 160 },
              children: [new TextRun({ text: para.trim(), size: 22, font: "Calibri" })]
            })
          ),
        ]
      }
    ]
  });

  const buffer = await Packer.toBlob(doc);
  const fileName = `${reportName.replace(/[^a-zA-Z0-9áéíóúñÁÉÍÓÚÑ ]/g, "_")}.docx`;
  if (window.saveAs) {
    window.saveAs(buffer, fileName);
  } else {
    // Fallback download
    const url = URL.createObjectURL(buffer);
    const a = document.createElement("a");
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  return true;
}

// ═══════ Generate Report (prompt-based flow) ═══════
async function generateReport() {
  // This is called when user pastes Claude's response
  const responseText = document.getElementById("claude-response").value.trim();
  if (!responseText) { alert("Pega la respuesta de Claude primero"); return; }

  setState({ generating: true, genProgress: 30, genStatus: "Interpretando respuesta de Claude..." });

  try {
    const content = parseClaudeResponse(responseText);
    if (!content) {
      setState({ generating: false, genProgress: 0, genStatus: "" });
      return;
    }

    setState({ genProgress: 60, genStatus: "Generando documento Word con fotos..." });

    const photos = selectedPhotos();
    const projectCode = state.useManualCode ? state.manualCode : state.selectedProject;
    const success = await generateDocx(content, photos, state.reportName, projectCode);

    if (success) {
      setState({ genProgress: 100, genStatus: "¡Reporte descargado!", generating: false, reportGenerated: true, generatedContent: content });
    }
  } catch (e) {
    alert("Error: " + e.message);
    setState({ generating: false, genProgress: 0, genStatus: "" });
  }
}

  // Back
  const backBtn = document.getElementById("btn-back");
  if(backBtn) backBtn.onclick = () => {
    if(state.screen==="camera") goFolder();
    else if(state.screen==="report") { setState({screen:"folder", reportGenerated:false, promptCopied:false, claudeResponse:""}); }
    else goHome();
  };

  // Folders
  document.querySelectorAll("[data-folder]").forEach(el=>{
    el.onclick = () => openFolder(el.dataset.folder);
  });

  // New folder
  const nf = document.getElementById("btn-new-folder");
  if(nf) nf.onclick = () => setState({showNewFolder:true});
  const cf = document.getElementById("btn-cancel-folder");
  if(cf) cf.onclick = () => setState({showNewFolder:false, newFolderName:""});
  const af = document.getElementById("btn-add-folder");
  if(af) af.onclick = addFolder;
  const nfi = document.getElementById("new-folder-input");
  if(nfi) { nfi.oninput = (e)=>{state.newFolderName=e.target.value;}; nfi.focus(); nfi.onkeydown=(e)=>{if(e.key==="Enter")addFolder();}; }

  // Folder actions
  const oc = document.getElementById("btn-open-camera");
  if(oc) oc.onclick = openCamera;
  const gl = document.getElementById("btn-gallery");
  if(gl) gl.onclick = importFromGallery;
  const or = document.getElementById("btn-open-report");
  if(or) or.onclick = openReport;

  // Toggle select
  document.querySelectorAll("[data-toggle]").forEach(el=>{
    el.onclick = (e) => { e.stopPropagation(); toggleSelect(Number(el.dataset.toggle)); };
  });

  // Photo editing
  document.querySelectorAll("[data-edit-photo]").forEach(el=>{
    el.onclick = (e) => {
      e.stopPropagation();
      const id = Number(el.dataset.editPhoto);
      const p = state.photos.find(x=>x.id===id);
      if(p) setState({editingPhotoId:id, editPhotoText:p.text||"", editPhotoTranscript:p.audioTranscript||""});
    };
  });
  document.querySelectorAll("[data-delete-audio]").forEach(el=>{
    el.onclick = (e) => { e.stopPropagation(); deletePhotoAudio(); };
  });
  const se = document.getElementById("btn-save-edit");
  if(se) se.onclick = () => {
    const t = document.getElementById("edit-photo-text");
    const tr = document.getElementById("edit-photo-transcript");
    if(t) state.editPhotoText = t.value;
    if(tr) state.editPhotoTranscript = tr.value;
    savePhotoEdit();
  };
  const ce = document.getElementById("btn-cancel-edit");
  if(ce) ce.onclick = () => setState({editingPhotoId:null, editRecordingPhotoId:null});

  // Edit audio recording
  document.querySelectorAll("[data-start-edit-rec]").forEach(el=>{
    el.onclick = (e) => { e.stopPropagation(); startEditAudioRec(Number(el.dataset.startEditRec)); };
  });
  document.querySelectorAll("[data-stop-edit-rec]").forEach(el=>{
    el.onclick = (e) => { e.stopPropagation(); stopEditAudioRec(); };
  });

  // Camera
  const ct = document.getElementById("capture-text");
  if(ct) ct.oninput = (e)=>{state.captureText=e.target.value;};
  const ta = document.getElementById("btn-toggle-audio");
  if(ta) ta.onclick = ()=>{ state.isRecording ? stopAudioRec() : startAudioRec(); };
  const cp = document.getElementById("btn-capture");
  if(cp) cp.onclick = capturePhoto;

  // Reconnect video stream
  if(state.screen==="camera" && state.stream) {
    setTimeout(()=>{
      const v = document.getElementById("cam-video");
      if(v && state.stream) { v.srcObject = state.stream; v.play(); }
    },50);
  }

  // Report form
  const rn = document.getElementById("report-name");
  if(rn) rn.oninput = (e)=>{state.reportName=e.target.value;};
  const ml = document.getElementById("btn-mode-list");
  if(ml) ml.onclick = ()=>setState({useManualCode:false});
  const mm = document.getElementById("btn-mode-manual");
  if(mm) mm.onclick = ()=>setState({useManualCode:true});
  const mc = document.getElementById("manual-code");
  if(mc) mc.oninput = (e)=>{state.manualCode=e.target.value;};
  const ps = document.getElementById("project-search");
  if(ps) { ps.oninput=(e)=>{state.projectSearch=e.target.value;state.showProjectDropdown=true;render();}; ps.onfocus=()=>{state.showProjectDropdown=true;render();}; }
  document.querySelectorAll("[data-project-code]").forEach(el=>{
    el.onclick = ()=>{state.selectedProject=el.dataset.projectCode;state.projectSearch="";state.showProjectDropdown=false;render();};
  });
  const conc = document.getElementById("conclusions-text");
  if(conc) conc.oninput = (e)=>{state.conclusions=e.target.value;};
  const ca = document.getElementById("btn-conc-audio");
  if(ca) ca.onclick = ()=>{ state.conclusionsRecording ? stopConcAudioRec() : startConcAudioRec(); };
  const cad = document.getElementById("btn-conc-audio-del");
  if(cad) cad.onclick = ()=>setState({conclusionsAudioBlob:null, conclusionsTranscript:""});

  // Intro audio
  const ig = document.getElementById("intro-guidelines");
  if(ig) ig.oninput = (e)=>{state.introGuidelines=e.target.value;};
  const ia = document.getElementById("btn-intro-audio");
  if(ia) ia.onclick = ()=>{ state.introRecording ? stopIntroAudioRec() : startIntroAudioRec(); };
  const iad = document.getElementById("btn-intro-audio-del");
  if(iad) iad.onclick = ()=>setState({introAudioBlob:null, introTranscript:""});

  // Test details
  const td = document.getElementById("test-date");
  if(td) td.oninput = (e)=>{state.testDate=e.target.value;};
  const tt = document.getElementById("test-time");
  if(tt) tt.oninput = (e)=>{state.testTime=e.target.value;};
  const tl = document.getElementById("test-location");
  if(tl) tl.oninput = (e)=>{state.testLocation=e.target.value;};
  const te = document.getElementById("test-equipment");
  if(te) te.oninput = (e)=>{state.testEquipment=e.target.value;};

  // Participants
  const addPart = document.getElementById("btn-add-participant");
  if(addPart) addPart.onclick = () => {
    const sel = document.getElementById("participant-select");
    if(sel && sel.value) {
      const parts = (state.testParticipants||'').split(',').map(s=>s.trim()).filter(s=>s);
      if(!parts.includes(sel.value)) { parts.push(sel.value); state.testParticipants=parts.join(', '); render(); }
      sel.value = '';
    }
  };
  const addCustomPart = document.getElementById("btn-add-custom-participant");
  if(addCustomPart) addCustomPart.onclick = () => {
    const inp = document.getElementById("custom-participant");
    if(inp && inp.value.trim()) {
      const parts = (state.testParticipants||'').split(',').map(s=>s.trim()).filter(s=>s);
      if(!parts.includes(inp.value.trim())) { parts.push(inp.value.trim()); state.testParticipants=parts.join(', '); }
      inp.value=''; render();
    }
  };
  document.querySelectorAll("[data-remove-participant]").forEach(el=>{
    el.onclick = () => {
      const name = el.dataset.removeParticipant;
      const parts = (state.testParticipants||'').split(',').map(s=>s.trim()).filter(s=>s&&s!==name);
      state.testParticipants = parts.join(', ');
      render();
    };
  });

  // Editable transcripts
  const ite = document.getElementById("intro-transcript-edit");
  if(ite) ite.oninput = (e)=>{state.introTranscript=e.target.value;};
  const cte = document.getElementById("conc-transcript-edit");
  if(cte) cte.oninput = (e)=>{state.conclusionsTranscript=e.target.value;};
  document.querySelectorAll("[data-remove]").forEach(el=>{
    el.onclick = (e)=>{ e.stopPropagation(); removeFromSelection(Number(el.dataset.remove)); };
  });
  const gen = document.getElementById("btn-generate");
  if(gen && !state.generating) gen.onclick = generateReport;
  const gp = document.getElementById("btn-gen-prompt");
  if(gp) gp.onclick = async () => {
    const prompt = buildPrompt();
    try {
      await navigator.clipboard.writeText(prompt);
      setState({promptCopied: true, promptGenerated: true});
    } catch(e) {
      // Fallback: show prompt in textarea for manual copy
      const ta = document.createElement("textarea");
      ta.value = prompt;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      setState({promptCopied: true, promptGenerated: true});
    }
  };
  const cr = document.getElementById("claude-response");
  if(cr) cr.oninput = (e) => { state.claudeResponse = e.target.value; };
  const dl = document.getElementById("btn-download-report");
  if(dl) dl.onclick = async () => {
    if(state.generatedContent) {
      const photos = selectedPhotos();
      const projectCode = state.useManualCode ? state.manualCode : state.selectedProject;
      await generateDocx(state.generatedContent, photos, state.reportName, projectCode);
    }
  };
  const nr = document.getElementById("btn-new-report");
  if(nr) nr.onclick = () => setState({screen:"folder", reportGenerated:false, generatedContent:null, promptCopied:false, claudeResponse:""});

  // Close dropdown on outside click
  document.addEventListener("click",(e)=>{
    if(state.showProjectDropdown && !e.target.closest(".dropdown")) { state.showProjectDropdown=false; render(); }
  },{once:true});
}

// ═══════ Init ═══════
loadData();
</script>
</body>
</html>
